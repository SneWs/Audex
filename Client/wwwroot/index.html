        <svg width="64" height="64" viewBox="0 0 512 512" style="margin-bottom:24px;">
            <rect width="512" height="512" rx="64" fill="#7c4dff"/>
            <g transform="translate(256,220)" fill="none" stroke="#fff" stroke-width="28" stroke-linecap="round">

            </g>
            <rect x="93" y="215" width="51" height="82" rx="16" fill="#fff"/>
